<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_index.css">
    <script src="script.js" defer></script>
    <title>Paletta</title>
</head>
<body>
    <!-- Parte do Cabeçalho -->
     <header class="cont-cabecalho">
        <h1 class="item-cabecalho logo-cabecalho">Paletta</h1>
        <button class="item-cabecalho login-cabecalho botaocomop" id="abrirmodal">Login</button>
        <p class="item-cabecalho register-cabecalho"><a href="register.html">Register</a></p>
     </header>

     <main>
    
<!-- Campo de Login (Modal) -->
<dialog id="modalLogin" class="modal-de-login">
    <section class="header-modal-login" >
        <h2 class="login-header-texto">Login</h2>
        <button id="fecharmodalbtn" class="fecharbtn">X</button>
    </section>

    <section class="campos">
        <section class="campo-nome-email">
            <label for="username">Usuário / Email: </label>
            <input type="text" id="username" placeholder="Nome ou email">
        </section>  

        <section class="campo-senha">
            <label for="senha">Senha: </label>
            <input type="password" id="senha" placeholder="Digite sua Senha">
            <section class="container-botao-entrar-teste">
        <button id="entrarbtn" class="entrar-botao" onclick="funcaomodalfechar()">Entrar</button>
            </section>
        </section>
    </section>
    </dialog>

        <!-- Frase "Principal" + Destaques Semanais -->
        <!-- Frase Principal -->
            <section class="cont-frasep">
            <h1 class="item-frasep">Destaques</h1>
            </section>
      <!-- Destaques Semanais -->
       <section class="cont-destaquesema">
            <button onclick="moveresquerda()" id="botaoesquerda" class="setas botaocomop">&lt</button>
            
            <section id="janelas-slide" class="item-destaquesema">
                <p class="slide">1</p>
                <p class="slide">2</p>
                <p class="slide">3</p>
                <p class="slide">4</p>
                <p class="slide">5</p>
                <p class="slide">6</p>
                <p class="slide">7</p>
                <p class="slide">8</p>
                <p class="slide">9</p>
            </section>
            <button onclick="moverdireita()" id="botaodireita" class="setas botaocomop">&gt</button>
       </section>

       <!-- Botão de Explorar indo para os Posts -->
        <section class="cont-botexp">
            <a class="item-botexp" href="explorar.html">Explorar</a>
        </section>
    </main>
    <footer class="cont-footer">
        <a class="item-footer" href="sobre.html">Sobre</a>
        <a class="item-footer" href="mailto:umEmailQueNaoExiste@umEmailQueNaoExiste.com">Contate-nos</a>
    </footer>
</body>
</html>
