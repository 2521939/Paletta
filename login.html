<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style_login.css">
    <link rel="stylesheet" href="style.css">
    <title>Paletta - Login</title>
</head>
<body>
    <main>
    <header class="cont-cabecalho">
        <a href="index.html">
        <h1 class="item-cabecalho logo-cabecalho">Paletta</h1>
        </a>
     </header>
        
        <div class="signup-card">
                <h2>Login</h2>
                <p>Preencha os campos para se logar.</p>

            <section class="fields-container">
                <div class="input-block">
                    <label for="user-name">Nome / Email</label>
                    <input type="text" id="user-name" placeholder="Seu Nome ou Email">
                </div>

                <div class="input-block">
                    <label for="user-pass">Senha</label>
                    <input type="password" id="user-pass" placeholder="Crie uma senha forte">
                </div>
            </section>

            <div class="actions">
                <button type="button" class="btn-send">Login</button>
            </div>

    </main>
</body>
</html>
